<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="form-container">
        <form>
            <h2>Contact Form</h2>
            <label for="name">Name: </label>
            <input 
                type="text"
                id="name"
                name="name"
                required 
            /> <br>
            <label for="email">Email: </label>
            <input
                type="email"
                id="email"
                name="email"
                required
            /><br>
            
            <label for="textarea">Comment: </label>
            <textarea 
            id="textarea"
            name="textarea"
            required >
            </textarea><br>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
